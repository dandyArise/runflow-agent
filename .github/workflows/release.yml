name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
            binary: runflow-agent
          - os: macos-15-intel
            artifact: macos-x64
            binary: runflow-agent
          - os: macos-latest
            artifact: macos-arm64
            binary: runflow-agent
          - os: windows-latest
            artifact: windows-x64
            binary: runflow-agent.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $name = "runflow-agent-${{ github.ref_name }}-${{ matrix.artifact }}"
          $dir = Join-Path "dist" $name
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" $dir
          Copy-Item "LICENSE.md" $dir
          Copy-Item "NOTICE.md" $dir
          Copy-Item "README.md" $dir
          Copy-Item "docs/providers.md" $dir
          Copy-Item "scripts/install.ps1" $dir
          Copy-Item "scripts/install.sh" $dir
          Compress-Archive -Path "$dir/*" -DestinationPath "dist/$name.zip" -Force

      - name: Smoke test Windows release archive
        if: matrix.artifact == 'windows-x64'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          .\scripts\test-release-smoke.ps1 -ArchivePath "dist/runflow-agent-${{ github.ref_name }}-${{ matrix.artifact }}.zip" -ExpectedVersion $version

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: runflow-agent-${{ matrix.artifact }}
          path: dist/*.zip

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            scripts/install.ps1
            scripts/install.sh
          generate_release_notes: true
